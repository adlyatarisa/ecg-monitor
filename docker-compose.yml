services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecg-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/../data:ro
    networks:
      - ecg-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8080),timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # stm32-backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: ecg-stm32
  #   restart: unless-stopped
  #   command: ["python", "stm32_server.py"]
  #   ports:
  #     - "8087:8087"
  #   devices:
  #     - "/dev/ttyUSB0:/dev/ttyUSB0"
  #   networks:
  #     - ecg-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecg-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
      - NEXT_PUBLIC_STM32_URL=http://localhost:8087
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecg-net

networks:
  ecg-net:
    driver: bridge
